<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teka Menu</title>
    <style>
      :root {
        color-scheme: light;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at top, rgba(255, 221, 236, 0.75), transparent 38%),
          linear-gradient(180deg, #fff9fc 0%, #fff4f8 100%);
        font-family: "Segoe UI", Tahoma, sans-serif;
        color: #3d2435;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 16px;
        background: rgba(255, 249, 252, 0.86);
        border-bottom: 1px solid rgba(240, 210, 225, 0.85);
        backdrop-filter: blur(16px);
      }

      .title {
        font-size: 16px;
        font-weight: 700;
      }

      .direct-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 10px 14px;
        border-radius: 999px;
        background: #f04f9a;
        color: white;
        text-decoration: none;
        font-size: 14px;
        font-weight: 600;
        white-space: nowrap;
      }

      .viewer {
        width: min(1100px, calc(100vw - 24px));
        margin: 16px auto 32px;
      }

      .page {
        width: 100%;
        margin: 0 auto 16px;
        border-radius: 22px;
        overflow: hidden;
        background: white;
        box-shadow: 0 18px 48px rgba(142, 53, 103, 0.14);
      }

      canvas {
        display: block;
        width: 100%;
        height: auto;
      }

      .status {
        width: min(1100px, calc(100vw - 24px));
        margin: 24px auto;
        padding: 16px 18px;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 18px 48px rgba(142, 53, 103, 0.08);
        text-align: center;
        line-height: 1.8;
      }

      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="title">Menu</div>
      <a class="direct-link" href="/menu/menu.pdf" target="_blank" rel="noreferrer">
        افتحي الـ PDF مباشرة
      </a>
    </header>

    <div id="status" class="status">جاري تحميل المنيو...</div>
    <main id="viewer" class="viewer hidden"></main>

    <script type="module">
      import * as pdfjsLib from "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.8.69/build/pdf.min.mjs";

      pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.8.69/build/pdf.worker.min.mjs";

      const statusEl = document.getElementById("status");
      const viewerEl = document.getElementById("viewer");

      async function renderPdf() {
        try {
          const task = pdfjsLib.getDocument("/menu/menu.pdf");
          const pdf = await task.promise;
          const viewportWidth = Math.min(1100, window.innerWidth - 24);

          for (let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber += 1) {
            const page = await pdf.getPage(pageNumber);
            const baseViewport = page.getViewport({ scale: 1 });
            const scale = viewportWidth / baseViewport.width;
            const viewport = page.getViewport({ scale });
            const outputScale = window.devicePixelRatio || 1;

            const pageEl = document.createElement("section");
            pageEl.className = "page";

            const canvas = document.createElement("canvas");
            const context = canvas.getContext("2d");

            canvas.width = Math.floor(viewport.width * outputScale);
            canvas.height = Math.floor(viewport.height * outputScale);
            canvas.style.width = `${viewport.width}px`;
            canvas.style.height = `${viewport.height}px`;

            context.setTransform(outputScale, 0, 0, outputScale, 0, 0);

            pageEl.appendChild(canvas);
            viewerEl.appendChild(pageEl);

            await page.render({
              canvasContext: context,
              viewport,
            }).promise;
          }

          statusEl.classList.add("hidden");
          viewerEl.classList.remove("hidden");
        } catch (error) {
          statusEl.innerHTML =
            'تعذر عرض المنيو داخل الصفحة. <a href="/menu/menu.pdf" target="_blank" rel="noreferrer">افتحي الـ PDF من هنا</a>';
          console.error(error);
        }
      }

      renderPdf();
    </script>
  </body>
</html>
