<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teka Menu</title>
    <style>
      :root {
        color-scheme: light;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at top, rgba(255, 221, 236, 0.75), transparent 38%),
          linear-gradient(180deg, #fff9fc 0%, #fff4f8 100%);
        font-family: "Segoe UI", Tahoma, sans-serif;
        color: #3d2435;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 16px;
        background: rgba(255, 249, 252, 0.86);
        border-bottom: 1px solid rgba(240, 210, 225, 0.85);
        backdrop-filter: blur(16px);
      }

      .title {
        font-size: 16px;
        font-weight: 700;
      }

      .back-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 10px 14px;
        border-radius: 999px;
        background: #f04f9a;
        color: white;
        text-decoration: none;
        font-size: 14px;
        font-weight: 600;
        white-space: nowrap;
        transition: transform 0.2s, box-shadow 0.2s;
      }

      .back-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(240, 79, 154, 0.4);
      }

      .viewer {
        width: min(1100px, calc(100vw - 24px));
        margin: 16px auto 32px;
      }

      .menu-image {
        width: 100%;
        border-radius: 22px;
        box-shadow: 0 18px 48px rgba(142, 53, 103, 0.14);
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="title">المنيو</div>
      <a class="back-btn" href="/">
        ← رجوع للرئيسية
      </a>
    </header>

    <main class="viewer">
      <img src="menu.png" alt="Teka Menu" class="menu-image" />
    </main>
  </body>
</html>
